<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Temp Mail System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --container-bg: #121212;
            --accent-cyan: #00f2fe;
            --accent-pink: #ff00ff;
            --text-main: #e0e0e0;
            --border-color: #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 1. Countdown Timer (Тающая полоска) */
        .session-timer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: #1a1a1a;
            z-index: 1000;
        }
        #progress-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-pink));
            box-shadow: 0 0 10px var(--accent-cyan);
            transition: width 1s linear;
        }

        .header {
            text-align: center;
            color: var(--accent-cyan);
            font-size: 0.8rem;
            margin-bottom: 20px;
            text-shadow: 0 0 5px var(--accent-cyan);
        }

        .address-box {
            background: var(--container-bg);
            border: 1px solid var(--accent-cyan);
            padding: 15px;
            border-radius: 4px;
            text-align: center;
            font-size: 1.1rem;
            box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.1);
            margin-bottom: 20px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 30px;
        }

        button {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 10px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:active { transform: scale(0.95); }

        .btn-reset { border-color: var(--accent-pink); color: var(--accent-pink); }

        /* 2. Skeleton Screen */
        .skeleton-loader { display: none; }
        .skeleton-item {
            height: 60px;
            background: #1a1a1a;
            border: 1px solid #333;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }
        .skeleton-item::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .inbox-header {
            color: var(--text-main);
            font-size: 0.8rem;
            margin-bottom: 10px;
            border-left: 3px solid var(--accent-cyan);
            padding-left: 10px;
        }

        .no-data {
            text-align: center;
            color: #555;
            margin-top: 40px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="session-timer"><div id="progress-fill"></div></div>

<div class="header">>> SYSTEM.MAIL.TEMP_ADDR <<</div>

<div id="addr" class="address-box">GENERATING...</div>

<div class="controls">
    <button onclick="copyAddr()">[ COPY ]</button>
    <button class="btn-reset" onclick="resetAddr()">[ RESET ]</button>
</div>

<div class="inbox-header">>> INBOX_STREAM <<</div>

<div id="loader" class="skeleton-loader">
    <div class="skeleton-item"></div>
    <div class="skeleton-item"></div>
    <div class="skeleton-item"></div>
</div>

<div id="inbox">
    <div class="no-data">[ NO_DATA_RECEIVED ]</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    let currentToken = localStorage.getItem('mail_token');
    let timeLeft = 600; // 10 минут

    // 1. Таймер сессии
    function startTimer() {
        const fill = document.getElementById('progress-fill');
        const interval = setInterval(() => {
            timeLeft--;
            fill.style.width = (timeLeft / 600) * 100 + '%';
            if (timeLeft <= 0) {
                clearInterval(interval);
                tg.showAlert("Сессия истекла!");
            }
        }, 1000);
    }

    // 2. Звук (Web Audio API)
    function playBeep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(440, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.5);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.5);
    }

    // 3. API Логика
    async function initMail() {
        if (!currentToken) {
            const res = await fetch('/api/create');
            const data = await res.json();
            currentToken = data.token;
            localStorage.setItem('mail_token', data.token);
            localStorage.setItem('mail_address', data.address);
        }
        document.getElementById('addr').innerText = localStorage.getItem('mail_address');
        checkInbox();
    }

    async function checkInbox() {
        const loader = document.getElementById('loader');
        const inbox = document.getElementById('inbox');
        
        loader.style.display = 'block';
        inbox.style.display = 'none';

        try {
            const res = await fetch('/api/check', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ token: currentToken })
            });
            const data = await res.json();
            
            if (data.length > 0) {
                playBeep();
                tg.HapticFeedback.notificationOccurred('success');
                inbox.innerHTML = data.map(m => `
                    <div class="skeleton-item" style="animation:none; background:#1a1a1a; padding:10px; height:auto;">
                        <div style="color:var(--accent-cyan); font-size:0.7rem;">${m.from.address}</div>
                        <div style="margin-top:5px;">${m.subject}</div>
                    </div>
                `).join('');
            }
        } finally {
            loader.style.display = 'none';
            inbox.style.display = 'block';
        }
    }

    function copyAddr() {
        const addr = document.getElementById('addr').innerText;
        navigator.clipboard.writeText(addr);
        tg.HapticFeedback.impactOccurred('medium');
        tg.showScanQrPopup({text: "Адрес скопирован!"}); // Просто для эффекта
        setTimeout(() => tg.closeScanQrPopup(), 1000);
    }

    function resetAddr() {
        localStorage.clear();
        location.reload();
    }

    window.onload = () => {
        startTimer();
        initMail();
        setInterval(checkInbox, 15000); // Проверка каждые 15 сек
    };
</script>
</body>
</html>
