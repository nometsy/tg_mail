<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Mail Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --container-bg: #121212;
            --accent-cyan: #00f2fe;
            --accent-pink: #ff00ff;
            --text-main: #e0e0e0;
            --border-color: #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            user-select: none;
        }

        /* 1. Countdown Timer */
        .session-timer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: #1a1a1a;
            z-index: 1000;
        }
        #progress-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-pink));
            box-shadow: 0 0 10px var(--accent-cyan);
            transition: width 1s linear;
        }

        .header {
            text-align: center;
            color: var(--accent-cyan);
            font-size: 0.75rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 0 0 5px var(--accent-cyan);
        }

        .address-box {
            background: var(--container-bg);
            border: 1px solid var(--accent-cyan);
            padding: 15px;
            border-radius: 4px;
            text-align: center;
            font-size: 1.1rem;
            color: var(--accent-cyan);
            box-shadow: inset 0 0 15px rgba(0, 242, 254, 0.05);
            margin-bottom: 20px;
            word-break: break-all;
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.5);
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }

        button {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 12px;
            font-family: inherit;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:active { transform: scale(0.96); opacity: 0.7; }

        .btn-reset { border-color: var(--accent-pink); color: var(--accent-pink); }

        /* 2. Skeleton Loader */
        .skeleton-loader { display: none; }
        .skeleton-item {
            height: 70px;
            background: #161616;
            border: 1px solid #222;
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }
        .skeleton-item::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .inbox-title {
            font-size: 0.8rem;
            margin-bottom: 15px;
            padding-left: 10px;
            border-left: 3px solid var(--accent-cyan);
            display: flex;
            justify-content: space-between;
        }

        .msg-card {
            background: #111;
            border: 1px solid #222;
            border-left: 3px solid var(--accent-cyan);
            padding: 12px;
            margin-bottom: 12px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .no-data {
            text-align: center;
            color: #444;
            margin-top: 50px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="session-timer"><div id="progress-fill"></div></div>

<div class="header">>> SYSTEM.MAIL.TEMP_ADDR <<</div>

<div id="addr" class="address-box">INITIALIZING...</div>

<div class="controls">
    <button onclick="copyAddr()">[ COPY ]</button>
    <button class="btn-reset" onclick="resetAddr()">[ RESET ]</button>
</div>

<div class="inbox-title">
    <span>>> INBOX_STREAM</span>
    <span id="sync-time" style="color:#555; font-size:0.6rem;"></span>
</div>

<div id="loader" class="skeleton-loader">
    <div class="skeleton-item"></div>
    <div class="skeleton-item"></div>
</div>

<div id="inbox">
    <div class="no-data">[ NO_DATA_RECEIVED ]</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const userId = tg.initDataUnsafe.user?.id;
    tg.expand();
    tg.ready();

    let timeLeft = 600; 
    let lastCount = 0;

    // 1. Таймер сессии
    function startTimer() {
        const fill = document.getElementById('progress-fill');
        const timer = setInterval(() => {
            timeLeft--;
            fill.style.width = (timeLeft / 600) * 100 + '%';
            if (timeLeft <= 60) fill.style.background = 'var(--accent-pink)';
            if (timeLeft <= 0) {
                clearInterval(timer);
                tg.showAlert("Время сессии истекло. Создайте новый ящик.");
            }
        }, 1000);
    }

    // 2. Звуковое уведомление
    function notify() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.5);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.5);
        tg.HapticFeedback.notificationOccurred('success');
    }

    // 3. Логика API
    async function init() {
        if (!userId) {
            document.getElementById('addr').innerText = "ERROR: USE TELEGRAM";
            return;
        }

        const res = await fetch('/api/init', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ userId })
        });
        const data = await res.json();
        document.getElementById('addr').innerText = data.address;
        check();
    }

    async function check() {
        const loader = document.getElementById('loader');
        const inbox = document.getElementById('inbox');
        const sync = document.getElementById('sync-time');

        loader.style.display = 'block';
        
        try {
            const res = await fetch('/api/check', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId })
            });
            const data = await res.json();
            
            sync.innerText = `SYNCED AT [${new Date().toLocaleTimeString()}]`;

            if (data.length > 0) {
                if (data.length > lastCount) notify();
                lastCount = data.length;
                
                inbox.innerHTML = data.map(m => `
                    <div class="msg-card">
                        <div style="color:var(--accent-cyan); font-size:0.7rem;">${m.from.address}</div>
                        <div style="margin-top:5px; font-size:0.9rem;">${m.subject}</div>
                    </div>
                `).join('');
            }
        } finally {
            loader.style.display = 'none';
        }
    }

    function copyAddr() {
        const text = document.getElementById('addr').innerText;
        navigator.clipboard.writeText(text);
        tg.HapticFeedback.impactOccurred('medium');
        // Эффект подтверждения через стандартный тост Telegram
        tg.showScanQrPopup({ text: "ADDRESS_COPIED" }); 
        setTimeout(() => tg.closeScanQrPopup(), 800);
    }

    async function resetAddr() {
        tg.HapticFeedback.impactOccurred('heavy');
        await fetch('/api/reset', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ userId })
        });
        location.reload();
    }

    // Старт
    window.onload = () => {
        startTimer();
        init();
        setInterval(check, 15000); 
    };
</script>
</body>
</html>
