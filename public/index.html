<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Mail Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --container-bg: #121212;
            --accent-cyan: #00f2fe;
            --accent-pink: #ff00ff;
            --text-main: #e0e0e0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 20px;
            overflow-x: hidden; user-select: none;
        }

        /* Таймер */
        .session-timer { position: fixed; top: 0; left: 0; width: 100%; height: 3px; background: #1a1a1a; z-index: 1000; }
        #progress-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-pink)); transition: width 1s linear; }

        .header { text-align: center; color: var(--accent-cyan); font-size: 0.75rem; margin-bottom: 20px; text-shadow: 0 0 5px var(--accent-cyan); }
        
        .address-box { 
            background: var(--container-bg); border: 1px solid var(--accent-cyan); 
            padding: 15px; border-radius: 4px; text-align: center; font-size: 1.1rem; 
            color: var(--accent-cyan); margin-bottom: 20px; word-break: break-all;
        }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        
        button { 
            background: transparent; border: 1px solid var(--accent-cyan); color: var(--accent-cyan); 
            padding: 12px; font-family: inherit; text-transform: uppercase; cursor: pointer; 
        }
        button:active { opacity: 0.7; transform: scale(0.98); }
        .btn-reset { border-color: var(--accent-pink); color: var(--accent-pink); }

        /* Inbox */
        .inbox-title { font-size: 0.8rem; margin-bottom: 15px; border-left: 3px solid var(--accent-cyan); padding-left: 10px; display: flex; justify-content: space-between; }
        .msg-card { background: #111; border: 1px solid #222; border-left: 3px solid var(--accent-cyan); padding: 12px; margin-bottom: 12px; cursor: pointer; }

        /* Modal */
        #message-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(10, 10, 10, 0.98); z-index: 2000; padding: 20px; box-sizing: border-box; 
        }
        .modal-content { border: 1px solid var(--accent-cyan); padding: 15px; background: var(--container-bg); height: 90%; display: flex; flex-direction: column; }
        .modal-header { border-bottom: 1px dashed var(--accent-cyan); margin-bottom: 15px; padding-bottom: 10px; }
        #msg-body { flex-grow: 1; overflow-y: auto; white-space: pre-wrap; font-size: 0.9rem; color: #bbb; }

        /* Loader */
        .skeleton-loader { display: none; }
        .skeleton-item { height: 60px; background: #1a1a1a; margin-bottom: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="session-timer"><div id="progress-fill"></div></div>
<div class="header">>> SYSTEM.MAIL.TEMP_ADDR <<</div>
<div id="addr" class="address-box">LOADING...</div>

<div class="controls">
    <button onclick="copyAddr()">[ COPY ]</button>
    <button class="btn-reset" onclick="resetAddr()">[ RESET ]</button>
</div>

<div class="inbox-title"><span>>> INBOX_STREAM</span><span id="sync-time" style="color:#555"></span></div>

<div id="loader" class="skeleton-loader"><div class="skeleton-item"></div></div>
<div id="inbox"></div>

<div id="message-modal">
    <div class="modal-content">
        <div class="modal-header">
            <div id="msg-from" style="color:var(--accent-cyan); font-size: 0.7rem;"></div>
            <div id="msg-subject" style="font-weight:bold; margin-top:5px;"></div>
        </div>
        <div id="msg-body"></div>
        <button onclick="closeMessage()" style="margin-top:20px; border-color:var(--accent-pink); color:var(--accent-pink)">[ CLOSE ]</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const userId = tg.initDataUnsafe.user?.id;
    let lastCount = 0;
    tg.expand();

    async function init() {
        const res = await fetch('/api/init', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ userId })
        });
        const data = await res.json();
        document.getElementById('addr').innerText = data.address;
        check();
    }

    async function check() {
        const res = await fetch('/api/check', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ userId })
        });
        const data = await res.json();
        const inbox = document.getElementById('inbox');
        
        if (data.length > 0) {
            if (data.length > lastCount) tg.HapticFeedback.notificationOccurred('success');
            lastCount = data.length;
            inbox.innerHTML = data.map(m => `
                <div class="msg-card" onclick="openMessage('${m.id}')">
                    <div style="color:var(--accent-cyan); font-size:0.7rem;">${m.from.address}</div>
                    <div style="margin-top:5px;">${m.subject}</div>
                </div>
            `).join('');
        }
    }

    async function openMessage(msgId) {
        const modal = document.getElementById('message-modal');
        const body = document.getElementById('msg-body');
        modal.style.display = 'block';
        body.innerText = ">> DECRYPTING DATA...";
        
        const res = await fetch('/api/message', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ userId, msgId })
        });
        const data = await res.json();
        
        document.getElementById('msg-from').innerText = `SENDER: ${data.from}`;
        document.getElementById('msg-subject').innerText = `SUBJECT: ${data.subject}`;
        body.innerText = data.text;
        tg.HapticFeedback.impactOccurred('light');
    }

    function closeMessage() { document.getElementById('message-modal').style.display = 'none'; }
    
    function copyAddr() {
        const text = document.getElementById('addr').innerText;
        navigator.clipboard.writeText(text);
        tg.HapticFeedback.impactOccurred('medium');
        tg.showAlert("Адрес скопирован!");
    }

    async function resetAddr() {
        await fetch('/api/reset', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ userId })
        });
        location.reload();
    }

    window.onload = init;
    setInterval(check, 15000);
</script>
</body>
</html>
